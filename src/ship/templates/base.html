<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ship — {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">Ship</a>
            <div class="nav-links">
                {% if role and role.value >= 3 %}
                <a href="{{ url_for('ship.bridge') }}" class="nav-link {% if request.endpoint == 'ship.bridge' %}active{% endif %}">Bridge</a>
                {% endif %}
                {% if role and role.value >= 2 %}
                <a href="{{ url_for('ship.porthole') }}" class="nav-link {% if request.endpoint == 'ship.porthole' %}active{% endif %}">Porthole</a>
                {% endif %}
                {% if role %}
                <a href="{{ url_for('ship.observation_deck') }}" class="nav-link {% if request.endpoint == 'ship.observation_deck' %}active{% endif %}">Observation Deck</a>
                <a href="{{ url_for('ship.captains_log') }}" class="nav-link {% if request.endpoint == 'ship.captains_log' %}active{% endif %}">Captain's Log</a>
                {% endif %}
                <span class="nav-user">{{ user }}</span>
            </div>
        </div>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        Ship v0.1.0
    </footer>
</body>
</html>
