{% for item in timeline %}
<details class="card entry-card" {% if loop.first and not is_fragment %}open{% endif %}>
    <summary class="entry-header">
        <span class="badge badge-{{ item.content_type }}">{{ item.content_type }}</span>
        <span class="entry-title">{{ item.title }}</span>
        <time class="entry-date">{{ item.date.strftime('%b %d, %Y') }}</time>
    </summary>
    <div class="entry-body rendered-content">{{ item.rendered_html | collapse_sections("weekly") | safe }}</div>
</details>
{% endfor %}
