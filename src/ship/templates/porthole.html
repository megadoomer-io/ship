{% extends "base.html" %}
{% block title %}Porthole{% endblock %}

{% block content %}
<h1>Porthole</h1>

{% if weekly_summary %}
<section class="card">
    <h2>This Week</h2>
    <div class="rendered-content">{{ weekly_summary | safe }}</div>
</section>
{% endif %}

{% if active_work %}
<section class="card">
    <h2>In Flight</h2>
    <div class="rendered-content">{{ active_work | safe }}</div>
</section>
{% endif %}
{% endblock %}
