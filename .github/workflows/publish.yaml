name: Publish

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=$(date -u '+%Y%m%dT%H%M%S')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/megadoomer-io/ship:${{ steps.tag.outputs.tag }}
            ghcr.io/megadoomer-io/ship:latest

  update-config:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout megadoomer-config
        uses: actions/checkout@v4
        with:
          repository: megadoomer-io/megadoomer-config
          token: ${{ secrets.GH_TOKEN_MEGADOOMER_CONFIG_WRITE }}

      - name: Update image tag
        run: |
          TAG="${{ needs.build-and-push.outputs.tag }}"
          cd applications/megadoomer/ship/do
          docker run --rm \
            -v "$(pwd)":/work --workdir /work \
            registry.k8s.io/kustomize/kustomize:v5.8.1 \
            edit set image app=ghcr.io/megadoomer-io/ship:"$TAG"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add applications/megadoomer/ship/do/kustomization.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git pull --rebase --autostash
          git commit -m "chore(ship): update image to ${{ needs.build-and-push.outputs.tag }}"
          git push
